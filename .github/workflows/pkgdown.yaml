# Build the pkgdown site and deploy it to the gh-pages branch.
# Derived from https://github.com/r-lib/actions/tree/v2/examples (pkgdown),
# with Quarto set up because the vignettes / articles are .qmd (mirrors
# this repo's R-CMD-check workflow).
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # Pin Quarto so the .qmd vignettes / articles render on the runner
      # (same as R-CMD-check.yaml; without it pkgdown's article build aborts).
      - uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. installs artoo so `library(artoo)` + the live demo-data
          # output resolve while pkgdown renders the .qmd articles.
          extra-packages: any::pkgdown, local::.
          needs: website
          install-quarto: false

      - name: Hide non-site root markdown
        # pkgdown's package_mds() renders every root *.md as a public page
        # and ignores .Rbuildignore. The dev notes (CLAUDE.local/MEMORY/
        # handoff) are gitignored and absent on CI, but CLAUDE.md, build.md,
        # debugging.md, and design.md are tracked, so drop them here. README
        # and NEWS are intentionally kept.
        run: rm -f CLAUDE.md build.md debugging.md design.md

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Build llms-full.txt
        # pkgdown 2.2 writes a per-page .md beside each .html and an index
        # llms.txt, but no single full-content file. Concatenate every per-page
        # .md (deterministic order) into llms-full.txt, next to llms.txt.
        # dst_path resolves to docs/ (release) or docs/dev/ (a .9000 dev
        # version) so the sidebar link is correct in both modes.
        run: |
          dst <- pkgdown::as_pkgdown(".")$dst_path
          mds <- sort(list.files(dst, "[.]md$", recursive = TRUE, full.names = TRUE))
          writeLines(unlist(lapply(mds, readLines, warn = FALSE)), file.path(dst, "llms-full.txt"))
        shell: Rscript {0}

      - name: Detect development mode
        # A 4-part .9000 version builds into docs/dev/ (pkgdown development
        # mode auto); a 3-part release version builds the site root. The
        # deploy step must match, or a full-replace dev deploy wipes the
        # release site off gh-pages (root 404, only /dev/ left — happened
        # 2026-07-22 on the 0.1.3.9000 bump).
        id: mode
        run: |
          dst <- basename(pkgdown::as_pkgdown(".")$dst_path)
          cat(sprintf("dev=%s\n", tolower(identical(dst, "dev"))),
              file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
        shell: Rscript {0}

      - name: Deploy release site 🚀
        if: github.event_name != 'pull_request' && steps.mode.outputs.dev == 'false'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          # Full replace of the release root so renamed or removed pages do
          # not linger as orphans, but keep the /dev/ subtree — it is owned
          # by the dev deploys below. build_site_github_pages() writes its
          # own .nojekyll into docs/, and there is no CNAME to preserve.
          clean: true
          clean-exclude: dev
          branch: gh-pages
          folder: docs

      - name: Deploy dev site 🚀
        if: github.event_name != 'pull_request' && steps.mode.outputs.dev == 'true'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          # A dev build produces only docs/dev/; deploy it into the dev/
          # subtree and clean just that subtree, leaving the release root
          # untouched.
          clean: true
          branch: gh-pages
          folder: docs/dev
          target-folder: dev
