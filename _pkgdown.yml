url: https://vthanik.github.io/artoo/

development:
  mode: auto

authors:
  Vignesh Thanikachalam:
    href: https://github.com/vthanik

template:
  bootstrap: 5
  bslib:
    primary: "#3b82f6"
    base_font: { google: "DM Sans" }
    heading_font: { google: "DM Sans" }
    code_font: { google: "DM Mono" }
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

home:
  # Match the sibling site's sidebar: Links / AI-Agents / License / Citation /
  # Developers. Omitting `dev` drops the "Dev status" badges section that
  # pkgdown adds for development versions (the badges still show on the README
  # / GitHub).
  sidebar:
    structure: [links, ai_agents, license, citation, authors]
    components:
      ai_agents:
        title: AI / Agents
        text: |
          [Skill](https://github.com/vthanik/artoo/blob/main/pkgdown/assets/skills/artoo/SKILL.md)

          [llms.txt](llms.txt)

          [llms-full.txt](llms-full.txt)
  title: Lossless CDISC-native dataset I/O for R
  description: >
    Read and write clinical-trial datasets losslessly across SAS XPORT,
    CDISC Dataset-JSON, Apache Parquet, and RDS through one canonical
    metadata model. Pure R and lightweight.
  links:
  - text: artoo on CRAN
    href: https://CRAN.R-project.org/package=artoo
  - text: CDISC Dataset-JSON v1.1
    href: https://cdisc-org.github.io/DataExchange-DatasetJson/
  - text: FDA Study Data Technical Conformance Guide
    href: https://www.fda.gov/media/153632/download
  - text: PHUSE Test Data Factory (demo data)
    href: https://github.com/phuse-org/phuse-scripts/tree/master/data/adam

reference:
- title: Specs
  desc: >
    Build a artoo_spec — the canonical CDISC-shaped description of your
    datasets, one CDISC standard each — or read one from native JSON, a
    Pinnacle 21 workbook, or Define-XML, and write it back out. Amend it in
    R when the data disagrees, then read any slot back with the spec_*
    accessors.
  contents:
  - artoo_spec
  - read_spec
  - write_spec
  - set_type
  - repair_spec
  - is_artoo_spec
  - spec_standard
  - spec_study
  - spec_datasets
  - spec_variables
  - spec_codelists
  - spec_keys
  - spec_methods
  - spec_comments
  - spec_documents

- title: Conform & validate
  desc: >
    Apply the spec to a raw frame — coerce, order, sort, stamp metadata —
    decode single variables through its codelists, and read or replace the
    artoo_meta the result carries. Then surface every conformance finding
    for one dataset or a whole study, plus the spec's own integrity, with
    the control object that scopes both.
  contents:
  - apply_spec
  - decode_column
  - get_meta
  - set_meta
  - sync_meta
  - is_artoo_meta
  - check_spec
  - check_study
  - validate_spec
  - conformance
  - artoo_checks
  - is_artoo_checks

- title: Read and write
  desc: >
    Lossless dataset I/O across every supported format — generic dispatch
    on the file extension, plus a short wrapper per format — and the
    SAS-viewer-style variable pane and dataset inventory for any file.
  contents:
  - read_dataset
  - write_dataset
  - read_xpt
  - write_xpt
  - read_json
  - write_json
  - read_ndjson
  - write_ndjson
  - read_parquet
  - write_parquet
  - read_rds
  - write_rds
  - columns
  - members
  - xpt_members

- title: Reference data
  desc: >
    Reference tables for the codecs this session can read and write and the
    encoding names R, SAS, and Python share, plus the bundled CDISC pilot
    specs, metadata tables, and datasets used throughout the docs — all
    rebuilt from public sources.
  contents:
  - artoo_formats
  - artoo_encodings
  - cdisc_specs
  - cdisc_spec
  - cdisc_adsl
  - cdisc_adae
  - cdisc_dm
  - cdisc_vs
  - cdisc_ts
  - cdisc_suppdm

articles:
- title: Articles
  navbar: ~
  contents:
  - articles/specs
  - articles/conform
  - articles/convert
  - articles/migrate-encoding
  - articles/recipes
