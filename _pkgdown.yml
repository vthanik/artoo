url: https://vthanik.github.io/artoo/

development:
  mode: auto

authors:
  Vignesh Thanikachalam:
    href: https://github.com/vthanik

template:
  bootstrap: 5
  bslib:
    primary: "#3b82f6"
    base_font: { google: "DM Sans" }
    heading_font: { google: "DM Sans" }
    code_font: { google: "DM Mono" }
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

home:
  # Match the sibling site's sidebar: Links / License / Citation / Developers.
  # Omitting `dev` drops the "Dev status" badges section that pkgdown adds for
  # development versions (the badges still show on the README / GitHub).
  sidebar:
    structure: [links, license, citation, authors]
  title: Lossless CDISC-native dataset I/O for R
  description: >
    Read and write clinical-trial datasets losslessly across SAS XPORT,
    CDISC Dataset-JSON, Apache Parquet, and RDS through one canonical
    metadata model. Pure R and lightweight.
  links:
  - text: CDISC Dataset-JSON v1.1
    href: https://cdisc-org.github.io/DataExchange-DatasetJson/
  - text: FDA Study Data Technical Conformance Guide
    href: https://www.fda.gov/media/153632/download
  - text: PHUSE Test Data Factory (demo data)
    href: https://github.com/phuse-org/phuse-scripts/tree/master/data/adam

reference:
- title: Specification
  desc: >
    Build a artoo_spec — the canonical CDISC-shaped description of your
    datasets, one CDISC standard each — or read one from native JSON, a
    Pinnacle 21 workbook, or Define-XML, and write it back out. Amend it in
    R when the data disagrees: retype a variable, or repair every integer
    mismatch a check surfaced.
  contents:
  - artoo_spec
  - read_spec
  - write_spec
  - set_type
  - repair_spec
  - is_artoo_spec

- title: Spec accessors
  desc: >
    One slot each from the spec — the standard, the study block, and the
    per-dataset metadata tables.
  contents:
  - spec_standard
  - spec_study
  - spec_datasets
  - spec_variables
  - spec_codelists
  - spec_keys
  - spec_methods
  - spec_comments
  - spec_documents

- title: Conform
  desc: >
    Apply the spec to a raw frame — coerce, order, sort, stamp
    metadata — and derive single variables through spec codelists.
  contents:
  - apply_spec
  - decode_column

- title: Metadata
  desc: >
    The artoo_meta every conformed frame carries: read it, replace it,
    and keep it in step with the data.
  contents:
  - get_meta
  - set_meta
  - sync_meta
  - is_artoo_meta

- title: Check
  desc: >
    Conformance findings for the data — one dataset or a whole study —
    integrity findings for the spec itself, and the control object that
    scopes both.
  contents:
  - check_spec
  - check_study
  - conformance
  - artoo_checks
  - is_artoo_checks
  - validate_spec

- title: Read and write
  desc: >
    Lossless dataset I/O across every supported format. Generic dispatch
    on the file extension, plus a short wrapper per format.
  contents:
  - read_dataset
  - write_dataset
  - read_xpt
  - write_xpt
  - read_json
  - write_json
  - read_ndjson
  - write_ndjson
  - read_parquet
  - write_parquet
  - read_rds
  - write_rds

- title: Inspect
  desc: >
    The SAS-viewer-style variable pane, and the dataset inventory of a
    file or directory.
  contents:
  - columns
  - members
  - xpt_members

- title: Formats and encodings
  desc: >
    Reference tables: which codecs this session can read and write, and
    the encoding names R, SAS, and Python use for the same bytes.
  contents:
  - artoo_formats
  - artoo_encodings

- title: Demo data
  desc: >
    Bundled CDISC pilot specs, metadata tables, and datasets used
    throughout the docs — all rebuilt from public sources.
  contents:
  - cdisc_specs
  - cdisc_spec
  - cdisc_adsl
  - cdisc_adae
  - cdisc_dm
  - cdisc_vs
  - cdisc_ts
  - cdisc_suppdm

articles:
- title: Task guides
  navbar: ~
  contents:
  - articles/adam-build
  - articles/sdtm-build
  - articles/convert
  - articles/dates
  - articles/validation
  - articles/errors
