url: https://vthanik.github.io/vport/

template:
  bootstrap: 5

reference:
- title: Spec
  desc: >
    Build, read, write, and inspect a vport_spec -- the canonical
    CDISC-shaped description of your datasets.
  contents:
  - vport_spec
  - read_spec
  - write_spec
  - spec_datasets
  - spec_variables
  - spec_codelists
  - spec_keys
  - spec_study
  - spec_methods
  - spec_comments
  - spec_documents

- title: Conform
  desc: >
    Apply a spec to a raw frame and carry its metadata.
  contents:
  - apply_spec
  - get_meta
  - set_meta

- title: Check
  desc: >
    Conformance findings for the data, and integrity of the spec itself.
  contents:
  - check_spec
  - validate_spec
  - vport_checks

- title: Read and write
  desc: >
    Lossless I/O across every supported format. Generic dispatch on the
    file extension, plus a short wrapper per format.
  contents:
  - read_dataset
  - write_dataset
  - read_xpt
  - write_xpt
  - read_json
  - write_json
  - read_parquet
  - write_parquet
  - read_rds
  - write_rds
  - vport_formats

- title: Classes and predicates
  contents:
  - vport_time
  - is_vport_spec
  - is_vport_meta
  - is_vport_checks
  - is_vport_time

- title: Demo data
  desc: >
    Bundled CDISC pilot metadata and datasets used throughout the docs.
  contents:
  - cdisc_spec
  - cdisc_adsl
  - cdisc_dm

articles:
- title: Get started
  navbar: ~
  contents:
  - from-spec-to-submission
  - one-dataset-every-format
