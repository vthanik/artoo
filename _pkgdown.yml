url: https://vthanik.github.io/artoo/

development:
  mode: auto

authors:
  Vignesh Thanikachalam:
    href: https://github.com/vthanik

template:
  bootstrap: 5
  bslib:
    primary: "#3b82f6"
    base_font: { google: "DM Sans" }
    heading_font: { google: "DM Sans" }
    code_font: { google: "DM Mono" }
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [reference, articles, news]
    right: [search, github]

home:
  # Match the sibling site's sidebar: Links / License / Citation / Developers.
  # Omitting `dev` drops the "Dev status" badges section that pkgdown adds for
  # development versions (the badges still show on the README / GitHub).
  sidebar:
    structure: [links, license, citation, authors]
  title: Lossless CDISC-native dataset I/O for R
  description: >
    Read and write clinical-trial datasets losslessly across SAS XPORT,
    CDISC Dataset-JSON, Apache Parquet, and RDS through one canonical
    metadata model. Pure R and lightweight.
  links:
  - text: CDISC Dataset-JSON v1.1
    href: https://cdisc-org.github.io/DataExchange-DatasetJson/
  - text: FDA Study Data Technical Conformance Guide
    href: https://www.fda.gov/media/153632/download
  - text: PHUSE Test Data Factory (demo data)
    href: https://github.com/phuse-org/phuse-scripts/tree/master/data/adam

reference:
- title: Spec
  desc: >
    Build, read, write, and inspect a artoo_spec -- the canonical
    CDISC-shaped description of your datasets, one CDISC standard each.
  contents:
  - artoo_spec
  - read_spec
  - write_spec
  - spec_standard
  - spec_datasets
  - spec_variables
  - spec_codelists
  - spec_keys
  - spec_study
  - spec_methods
  - spec_comments
  - spec_documents

- title: Conform
  desc: >
    Apply a spec to a raw frame, derive through codelists, and carry the
    metadata.
  contents:
  - apply_spec
  - decode_column
  - get_meta
  - set_meta
  - sync_meta

- title: Check
  desc: >
    Conformance findings for the data, and integrity of the spec itself.
  contents:
  - check_spec
  - conformance
  - validate_spec
  - artoo_checks

- title: Columns
  desc: >
    The SAS-viewer-style variable pane, on a frame or a file.
  contents:
  - columns
  - xpt_members

- title: Read and write
  desc: >
    Lossless I/O across every supported format. Generic dispatch on the
    file extension, plus a short wrapper per format.
  contents:
  - read_dataset
  - write_dataset
  - read_xpt
  - write_xpt
  - read_json
  - write_json
  - read_ndjson
  - write_ndjson
  - read_parquet
  - write_parquet
  - read_rds
  - write_rds
  - artoo_formats
  - artoo_encodings

- title: Classes and predicates
  contents:
  - is_artoo_spec
  - is_artoo_meta
  - is_artoo_checks

- title: Demo data
  desc: >
    Bundled CDISC pilot specs, metadata tables, and datasets used
    throughout the docs -- all rebuilt from public sources.
  contents:
  - cdisc_specs
  - cdisc_spec
  - cdisc_adsl
  - cdisc_adae
  - cdisc_dm
  - cdisc_vs
  - cdisc_ts
  - cdisc_suppdm

articles:
- title: Get started
  navbar: ~
  contents:
  - getting-started
